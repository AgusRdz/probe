name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build, sign, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Validate semver tag
        run: |
          if ! echo "${{ github.ref_name }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag '${{ github.ref_name }}' is not valid semver"
            exit 1
          fi

      - name: Run tests
        run: go test ./... -count=1

      - name: Build binaries
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/probe-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/probe-linux-arm64 .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/probe-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/probe-darwin-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/probe-windows-amd64.exe .

      - name: Sign binaries
        env:
          PROBE_SIGNING_KEY: ${{ secrets.PROBE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          echo "$PROBE_SIGNING_KEY" | base64 -d > /tmp/signing.pem
          openssl pkey -in /tmp/signing.pem -noout
          for f in dist/probe-*; do
            openssl pkeyutl -sign -rawin -inkey /tmp/signing.pem -in "$f" | base64 > "${f}.sig"
            [ -s "${f}.sig" ] || { echo "ERROR: ${f}.sig is empty — signing failed"; exit 1; }
            echo "Signed: ${f}.sig"
          done
          rm /tmp/signing.pem

      - name: Upload release assets
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          draft: false
          files: |
            dist/probe-linux-amd64
            dist/probe-linux-amd64.sig
            dist/probe-linux-arm64
            dist/probe-linux-arm64.sig
            dist/probe-darwin-amd64
            dist/probe-darwin-amd64.sig
            dist/probe-darwin-arm64
            dist/probe-darwin-arm64.sig
            dist/probe-windows-amd64.exe
            dist/probe-windows-amd64.exe.sig
